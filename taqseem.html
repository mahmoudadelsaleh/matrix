<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Edumas - الأستاذ محمود عادل</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@500;700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-user-select: none; touch-action: none; }
        body { font-family: 'Tajawal', sans-serif; background-color: #0f172a; height: 100vh; display: flex; flex-direction: column; align-items: center; overflow: hidden; position: fixed; }
        
        /* شريط العدادات العلوي - تأكد من ظهوره في قمة الشاشة */
        .stats-bar { 
            width: 100%; background: #334155; color: #fff; font-size: 0.7rem; 
            padding: 4px 15px; display: flex; justify-content: space-between; 
            border-bottom: 2px solid #10b981; flex-shrink: 0; z-index: 1000;
        }

        .app-header { color: #f8fafc; font-size: 1rem; font-weight: bold; padding: 4px 0; text-shadow: 0 2px 4px rgba(0,0,0,0.5); flex-shrink: 0; }
        .calc-body { width: 95%; max-width: 375px; background: #1e293b; border-radius: 12px; padding: 6px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); border: 1px solid #334155; flex-shrink: 0; }
        .screen { background: #cbd5e1; border-radius: 8px; padding: 4px; margin-bottom: 4px; }
        .point-box { background: #ffffff; border-radius: 5px; padding: 4px; display: flex; align-items: center; justify-content: center; font-weight: bold; margin-bottom: 2px; border: 1px solid #94a3b8; font-size: 0.9rem; position: relative; color: #1e293b; }
        .input-val { color: #1d4ed8; min-width: 30px; text-align: center; border-bottom: 2px solid transparent; cursor: pointer; font-size: 0.95rem; }
        .input-val.active { border-bottom-color: #ef4444; animation: blink 0.8s infinite; color: #ef4444; font-weight: bold; }
        @keyframes blink { 50% { border-bottom-color: transparent; opacity: 0.5; } }
        #gr { background: #fff; border-radius: 6px; width: 100%; height: 160px; border: 1px solid #64748b; margin-top: 4px; }
        .flex-row { display: flex; gap: 4px; margin-top: 4px; width: 100%; }
        .ratio-box { display: flex; align-items: center; justify-content: center; background: white; border-radius: 6px; border: 1px solid #94a3b8; font-size: 0.85rem; font-weight: bold; padding: 3px; }
        .grid-keys { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; margin-top: 6px; width: 100%; }
        .key { background: #334155; border: none; border-bottom: 3px solid #000; color: white; padding: 10px 0; border-radius: 8px; font-size: 1.2rem; font-weight: bold; font-family: 'Tajawal'; }
        .key:active { border-bottom-width: 1px; transform: translateY(2px); background: #1e293b; }
        .key-calc { background: #10b981; grid-column: span 2; border-bottom-color: #064e3b; }
        .key-reset { background: #ef4444; border-bottom-color: #7f1d1d; }
        .btn-toggle { background: #334155; color: white; border: none; border-bottom: 2px solid #000; border-radius: 6px; font-weight: bold; padding: 4px; font-family: 'Tajawal'; font-size: 0.8rem; }
        .info-container { width: 95%; max-width: 380px; margin-top: 4px; background: rgba(30, 41, 59, 0.9); border-radius: 8px; padding: 8px; border: 1px solid #334155; color: #94a3b8; font-size: 0.75rem; text-align: center; line-height: 1.4; flex-shrink: 0; }
        .clear-btn { background: #ef4444; color: white; border-radius: 3px; padding: 1px 5px; font-size: 0.55rem; position: absolute; left: 5px; cursor: pointer; border: none; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="stats-bar">
        <span id="devices-count">الأجهزة: ٠</span>
        <span id="visits-count">الاستخدام: ٠</span>
    </div>

    <div class="app-header">تقسيم القطعة المستقيمة (أولى ثانوي)</div>

    <div class="calc-body">
        <div class="screen">
            <div class="point-box"><span>أ = (</span><div id="x1" class="input-val active" onclick="sf('x1')">؟</div><span>،</span><div id="y1" class="input-val" onclick="sf('y1')">؟</div><span>)</span></div>
            <div class="point-box"><span>ب = (</span><div id="x2" class="input-val" onclick="sf('x2')">؟</div><span>،</span><div id="y2" class="input-val" onclick="sf('y2')">؟</div><span>)</span></div>
            <div class="point-box" style="background: #f0fdf4;">
                <button class="clear-btn" onclick="clC()">إعادة مجهول</button>
                <span style="color:#15803d">جـ = (</span><div id="cx" class="input-val" onclick="sf('cx')">؟</div><span>،</span><div id="cy" class="input-val" onclick="sf('cy')">؟</div><span>)</span>
            </div>
            <div class="flex-row">
                <button id="tBtn" onclick="tg()" class="btn-toggle" style="flex:1">داخل (+)</button>
                <div class="ratio-box" style="flex:1">
                    <span>ل : م = </span><div id="l" class="input-val" onclick="sf('l')">؟</div>:<div id="m" class="input-val" onclick="sf('m')">؟</div>
                </div>
            </div>
            <canvas id="gr" onclick="toggleFS()"></canvas>
        </div>
        <div class="grid-keys">
            <button class="key" onclick="pk('٧')">٧</button><button class="key" onclick="pk('٨')">٨</button><button class="key" onclick="pk('٩')">٩</button>
            <button class="key" style="background:#ea580c" onclick="bk()">⌫</button>
            <button class="key" onclick="pk('٤')">٤</button><button class="key" onclick="pk('٥')">٥</button><button class="key" onclick="pk('٦')">٦</button>
            <button class="key" style="background:#2563eb" onclick="nx()">⏎</button>
            <button class="key" onclick="pk('١')">١</button><button class="key" onclick="pk('٢')">٢</button><button class="key" onclick="pk('٣')">٣</button>
            <button class="key key-reset" onclick="rs()">جديد</button>
            <button class="key" onclick="pk('٠')">٠</button><button class="key" onclick="pk('-')">ـ</button>
            <button class="key key-calc" onclick="cl()">احسب</button>
        </div>
    </div>
    <div class="info-container">مطور التطبيق: أ/ محمود عادل صالح (معلم رياضيات)<br>Edu MAS Tools © ٢٠٢٦</div>

<script>
    // --- إعدادات Firebase الخاصة بك مع إضافة رابط قاعدة البيانات ---
    const firebaseConfig = {
        apiKey: "AIzaSyBy0lkZZdbrDXcdzCt1fGYNrE2vS33pNbw",
        authDomain: "edumastools.firebaseapp.com",
        projectId: "edumastools",
        storageBucket: "edumastools.firebasestorage.app",
        databaseURL: "https://edumastools-default-rtdb.firebaseio.com", 
        messagingSenderId: "541432270503",
        appId: "1:541432270503:web:06af14f3c8b43396ac1582"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    function startTracking() {
        const statsRef = database.ref('stats');
        
        // عد الزيارات
        statsRef.child('visits').transaction(c => (c || 0) + 1);

        // عد الأجهزة الفريدة
        let dId = localStorage.getItem('device_id');
        if (!dId) {
            dId = 'dev_' + Date.now();
            localStorage.setItem('device_id', dId);
            statsRef.child('devices').transaction(c => (c || 0) + 1);
        }

        // الاستماع للتغييرات لحظياً
        statsRef.on('value', (snap) => {
            const data = snap.val() || {devices: 0, visits: 0};
            document.getElementById('devices-count').innerText = "الأجهزة: " + (data.devices || 0);
            document.getElementById('visits-count').innerText = "الاستخدام: " + (data.visits || 0);
        });
    }

    // تشغيل التتبع
    startTracking();

    // --- منطق الآلة الحاسبة (كما هو) ---
    let cF = 'x1'; const fL = ['x1','y1','x2','y2','cx','cy','l','m']; let isI = true;
    const hd = ['٠','١','٢','٣','٤','٥','٦','٧','٨','٩'];

    function sf(id){ document.querySelectorAll('.input-val').forEach(e=>e.classList.remove('active')); document.getElementById(id).classList.add('active'); cF=id; }
    function nx(){ let i=fL.indexOf(cF); sf(fL[(i+1)%fL.length]); }
    function pk(n){ let e=document.getElementById(cF); if(e.innerText==='؟') e.innerText=n; else e.innerText+=n; }
    function bk(){ let e=document.getElementById(cF); e.innerText=(e.innerText.length>1 && e.innerText!=='؟')?e.innerText.slice(0,-1):'؟'; }
    function tg(){ isI=!isI; let b=document.getElementById('tBtn'); b.innerText=isI?"داخل (+)":"خارج (-)"; b.style.background=isI?"#334151":"#991b1b"; }
    function clC(){ document.getElementById('cx').innerText='؟'; document.getElementById('cy').innerText='؟'; sf('l'); }
    function toE(s){ if(s==='؟') return NaN; let r=s.replace(/ـ/g,'-'); hd.forEach((d,i)=>r=r.replace(new RegExp(d,'g'),i)); return parseFloat(r); }
    function toH(n){ if(isNaN(n)) return "؟"; let v = Math.round(n*100)/100; return v.toString().replace(/\d/g, d=>hd[d]).replace('-','ـ'); }
    function getGcd(a, b) { return b ? getGcd(b, a % b) : a; }

    function cl(){
        const v = {}; fL.forEach(f=>v[f]=toE(document.getElementById(f).innerText));
        if(isNaN(v.x1) || isNaN(v.y1) || isNaN(v.x2) || isNaN(v.y2)) return;
        let fX, fY, rL, rM;
        if(document.getElementById('cx').innerText !== '؟'){
            let ratio = (v.x2 !== v.x1) ? (v.cx - v.x1) / (v.x2 - v.cx) : (v.cy - v.y1) / (v.y2 - v.cy);
            if (ratio < 0 && isI) tg(); else if (ratio > 0 && !isI) tg();
            let absR = Math.abs(ratio);
            let n = Math.round(absR * 1000), d = 1000;
            let common = getGcd(n, d);
            rL = n / common; rM = d / common;
            document.getElementById('l').innerText = toH(rL);
            document.getElementById('m').innerText = toH(rM);
            fX = v.cx; fY = v.cy;
        } else {
            rL = v.l; rM = v.m;
            if(isNaN(rL) || isNaN(rM)) return;
            let l = rL, m = rM; if(!isI) l = -l;
            fX = (l*v.x2 + m*v.x1)/(l+m); fY = (l*v.y2 + m*v.y1)/(l+m);
            document.getElementById('cx').innerText = toH(fX); document.getElementById('cy').innerText = toH(fY);
        }
        drawAll(v.x1, v.y1, v.x2, v.y2, fX, fY, rL, rM);
    }

    function drawAll(x1, y1, x2, y2, cx, cy, l, m){ 
        const can = document.getElementById('gr'), ctx = can.getContext('2d');
        can.width = can.clientWidth * 2; can.height = can.clientHeight * 2;
        ctx.scale(2, 2); const w = can.clientWidth, h = can.clientHeight;
        ctx.clearRect(0,0,w,h); const p=45, xs=[x1,x2,cx,0], ys=[y1,y2,cy,0];
        const minX=Math.min(...xs), maxX=Math.max(...xs), minY=Math.min(...ys), maxY=Math.max(...ys);
        const tx=v=> p + (v - minX) * (w - 2 * p) / (maxX - minX || 1);
        const ty=v=> h - (p + (v - minY) * (h - 2 * p) / (maxY - minY || 1));
        ctx.strokeStyle="#e2e8f0"; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(tx(minX), ty(0)); ctx.lineTo(tx(maxX), ty(0)); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(tx(0), ty(minY)); ctx.lineTo(tx(0), ty(maxY)); ctx.stroke();
        if(!isNaN(x1)){
            ctx.strokeStyle="#ef4444"; ctx.lineWidth=3; ctx.beginPath(); ctx.moveTo(tx(x1),ty(y1)); ctx.lineTo(tx(x2),ty(y2)); ctx.stroke();
            if(!isI){ ctx.setLineDash([5, 5]); ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(tx(x1),ty(y1)); ctx.lineTo(tx(cx),ty(cy)); ctx.stroke(); ctx.beginPath(); ctx.moveTo(tx(x2),ty(y2)); ctx.lineTo(tx(cx),ty(cy)); ctx.stroke(); ctx.setLineDash([]); }
        }
        dp(ctx, tx(x1), ty(y1), "أ", toH(x1), toH(y1), "#ef4444", 10);
        dp(ctx, tx(x2), ty(y2), "ب", toH(x2), toH(y2), "#ef4444", 10);
        if(!isNaN(cx)) dp(ctx, tx(cx), ty(cy), "جـ", toH(cx), toH(cy), "#10b981", 10);
    }

    function dp(ctx, x, y, n, vx, vy, c, s){ 
        if(isNaN(x)) return; ctx.fillStyle=c; ctx.beginPath(); ctx.arc(x,y,4,0,7); ctx.fill();
        ctx.fillStyle="#1e293b"; ctx.font=`bold ${s}px Tajawal`; ctx.fillText(`${n}( ${vx} ، ${vy} )`, x + 6, y - 6);
    }
    
    function rs(){ location.reload(); }
</script>
</body>
</html>
